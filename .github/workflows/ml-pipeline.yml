name: ML Notebook Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  run-notebook:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install numpy pandas scikit-learn matplotlib jupyter

      - name: Run Jupyter Notebook
        run: |
          jupyter nbconvert --to notebook --execute index.ipynb --output executed_notebook.ipynb
